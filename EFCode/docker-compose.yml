version: '3.8'
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "YourStrong!Pass123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    container_name: sqlserver
  app:
    build:
      context: ./DatabaseFirst
      dockerfile: Dockerfile
    environment:
      - ConnectionStrings__Default=Server=sqlserver;Database=AppDb;User Id=sa;Password=YourStrong!Pass123;
    depends_on:
      - sqlserver
    ports:
      - "8080:80"